# LXC 102 — Ollama Inference Engine Container
# Proxmox VE configuration file
# Location on host: /etc/pve/lxc/102.conf
#
# Compliance: CIS Level 2 (LXC unprivileged), NIST 800-53 SC-7
arch: amd64
cores: 24
hostname: ollama-brain
memory: 49152
net0: name=eth0,bridge=vmbr1,hwaddr=YY:YY:YY:YY:YY:YY,ip=10.0.0.102/24,gw=,type=veth
# No gateway (gw=) — enforces air-gap on this container
ostype: debian
rootfs: local-zfs:subvol-102-disk-0,size=50G
swap: 0
unprivileged: 1

# ZFS Model Storage Bind Mount (1 MB recordsize dataset optimised for model weights)
mp0: /tank/ollama-models,mp=/root/.ollama/models,backup=0
