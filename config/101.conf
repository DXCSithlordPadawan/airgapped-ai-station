# LXC 101 — Claude Code Agent Container
# Proxmox VE configuration file
# Location on host: /etc/pve/lxc/101.conf
#
# Compliance: CIS Level 2 (LXC unprivileged), NIST 800-53 SC-7
arch: amd64
cores: 12
features: nesting=1
hostname: claude-agent
memory: 16384
net0: name=eth0,bridge=vmbr1,hwaddr=XX:XX:XX:XX:XX:XX,ip=10.0.0.101/24,gw=,type=veth
# No gateway (gw=) — enforces air-gap on this container
ostype: debian
rootfs: local-zfs:subvol-101-disk-0,size=100G
swap: 0
unprivileged: 1

# ZFS Workspace Bind Mount (read-write, no backup of large workspace)
mp0: /tank/workspace,mp=/src,backup=0
